<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyBloxx Defense</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="menu">
    <h1>MYBLOXX DEFENSE</h1>
    <button id="playBtn">PLAY</button>
</div>

<div id="ui">
    ❤️ Base HP: <span id="baseHp">100</span>
    <br>
    💰 Money: <span id="money">200</span>
</div>

<div id="towerButton">
    PLACE TOWER ($50)
</div>

<div id="game">

    <!-- PATH -->
    <div class="path horizontal" style="top:300px; left:0px; width:500px;"></div>
    <div class="path vertical" style="top:300px; left:450px; height:250px;"></div>
    <div class="path horizontal" style="top:500px; left:450px; width:600px;"></div>

    <!-- BASE -->
    <div id="base"></div>

</div>

<script src="script.js"></script>
</body>
</html>
